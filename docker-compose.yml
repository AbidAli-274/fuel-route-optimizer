services:
  web:
    build:
      context: .
      target: runtime
    env_file:
      - path: .env
        required: false
    environment:
      DJANGO_DB_PATH: /data/db.sqlite3
      DJANGO_DEBUG: "true"
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
      - sqlite_data:/data
    ports:
      - "8000:8000"
    init: true
    restart: unless-stopped

volumes:
  sqlite_data:
